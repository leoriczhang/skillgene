<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillGene 技能管理</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #2f81f7; --green: #3fb950;
    --amber: #d29922; --red: #f85149; --purple: #a371f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-size: 14px;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; display: flex; align-items: center; gap: 10px; }
  .meta { color: var(--muted); font-size: 12px; }
  main { padding: 20px 24px; max-width: 1180px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat .label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .stat .value { font-size: 24px; font-weight: 600; }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
  section > h2 {
    font-size: 14px; margin: 0; padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--panel2); display: flex; align-items: center; gap: 8px; justify-content: space-between;
  }
  section > h2 .count { color: var(--muted); font-weight: 400; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 500; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .desc-cell { max-width: 460px; color: var(--muted); font-size: 12.5px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid transparent; }
  .badge.blue { background: rgba(47,129,247,.15); color: var(--accent); border-color: rgba(47,129,247,.4); }
  .badge.purple { background: rgba(163,113,247,.15); color: var(--purple); border-color: rgba(163,113,247,.4); }
  .badge.gray { background: rgba(139,148,158,.15); color: var(--muted); border-color: rgba(139,148,158,.3); }
  .badge.green { background: rgba(63,185,80,.15); color: var(--green); border-color: rgba(63,185,80,.4); }
  .conn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.off { background: var(--muted); }
  .empty { padding: 24px 16px; color: var(--muted); text-align: center; }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 12px; cursor: pointer;
  }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.ghost.danger { border-color: var(--red); color: var(--red); }
  button.sm { padding: 3px 10px; }
  button:disabled { opacity: .5; cursor: default; }
  button:hover:not(:disabled) { opacity: .9; }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .row-actions { display: flex; gap: 6px; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: rgba(47,129,247,.08); }
  /* modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 860px; max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
  .modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--panel2); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .modal-head h3 { margin: 0; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .modal-head .close { background: transparent; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
  .modal-body { padding: 16px 18px; overflow: auto; }
  .modal-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; background: var(--panel2); }
  .field { margin-bottom: 14px; }
  .field label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit;
  }
  .field textarea { resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; line-height: 1.55; }
  .field .hint { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tabs { display: flex; gap: 6px; margin: 0 0 14px; flex-wrap: wrap; }
  .tab { background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .file-list { list-style: none; margin: 0; padding: 0; }
  .file-list li { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; font-size: 12.5px; }
  .file-list li .fp { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
  .drop { border: 1px dashed var(--border); border-radius: 8px; padding: 18px; text-align: center; color: var(--muted); font-size: 12.5px; cursor: pointer; }
  .drop.over { border-color: var(--accent); color: var(--accent); background: rgba(47,129,247,.06); }
  .toast { position: fixed; right: 20px; bottom: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast .t { background: var(--panel); border: 1px solid var(--border); border-left-width: 3px; border-radius: 8px; padding: 10px 14px; font-size: 12.5px; min-width: 220px; box-shadow: 0 6px 20px rgba(0,0,0,.4); }
  .toast .t.ok { border-left-color: var(--green); }
  .toast .t.err { border-left-color: var(--red); }
  .toast .t .sub { color: var(--muted); font-size: 11px; margin-top: 3px; }
  a.link { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>🧬 SkillGene 技能管理</h1>
  <div class="toolbar">
    <span class="conn"><span id="cloudDot" class="dot off"></span><span id="cloudTxt" class="meta">云端同步：未知</span></span>
    <button class="ghost sm" onclick="refresh()">刷新</button>
    <button onclick="openCreate()">+ 新建技能</button>
  </div>
</header>
<main>
  <div class="grid">
    <div class="stat"><div class="label">技能总数</div><div class="value" id="statTotal">—</div></div>
    <div class="stat"><div class="label">分类数</div><div class="value" id="statCats">—</div></div>
    <div class="stat"><div class="label">带附件技能</div><div class="value" id="statBundles">—</div></div>
    <div class="stat"><div class="label">同步状态</div><div class="value" id="statSync">—</div></div>
  </div>

  <section>
    <h2><span>技能列表 <span class="count" id="listCount"></span></span>
      <span class="toolbar">
        <button class="ghost sm" onclick="openImport()">上传 .zip 技能包</button>
      </span>
    </h2>
    <table>
      <thead><tr><th>名称</th><th>分类</th><th>描述</th><th>附件</th><th>更新时间</th><th></th></tr></thead>
      <tbody id="skillRows"><tr><td colspan="6" class="empty">加载中…</td></tr></tbody>
    </table>
  </section>
</main>

<!-- Editor modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="editTitle">编辑技能</h3>
      <button class="close" onclick="closeModal('editModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab active" data-tab="form" onclick="switchTab('form')">表单编辑</button>
        <button class="tab" data-tab="raw" onclick="switchTab('raw')">原文 SKILL.md</button>
        <button class="tab" data-tab="files" onclick="switchTab('files')" id="filesTabBtn">附件文件</button>
      </div>

      <div id="tab-form">
        <div class="two-col">
          <div class="field">
            <label>名称 *</label>
            <input id="fName" placeholder="my-skill" />
            <div class="hint">仅字母数字及 . - _；已存在则视为更新</div>
          </div>
          <div class="field">
            <label>分类</label>
            <input id="fCategory" placeholder="general" />
          </div>
        </div>
        <div class="field">
          <label>描述 *</label>
          <textarea id="fDesc" rows="2" placeholder="Use when …. NOT for: …"></textarea>
        </div>
        <div class="field">
          <label>正文 (Markdown)</label>
          <textarea id="fBody" rows="14" placeholder="# 标题&#10;&#10;技能说明…"></textarea>
        </div>
      </div>

      <div id="tab-raw" style="display:none;">
        <div class="field">
          <label>SKILL.md 原文（含 YAML frontmatter）</label>
          <textarea id="fRaw" rows="22" placeholder="---&#10;name: ...&#10;description: ...&#10;---&#10;&#10;# ..."></textarea>
          <div class="hint">填写后将按原文写入，覆盖表单字段。</div>
        </div>
      </div>

      <div id="tab-files" style="display:none;">
        <div id="fileListWrap"></div>
        <div class="drop" id="fileDrop">点击或拖拽文件到此处上传（支持多选，写入技能目录，不含 SKILL.md）</div>
        <input type="file" id="fileInput" multiple style="display:none;" />
      </div>
    </div>
    <div class="modal-foot">
      <span class="meta" id="editHint" style="margin-right:auto;"></span>
      <button class="ghost" onclick="closeModal('editModal')">取消</button>
      <button id="saveBtn" onclick="saveSkill()">保存</button>
    </div>
  </div>
</div>

<!-- Import zip modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-head"><h3>上传 .zip 技能包</h3><button class="close" onclick="closeModal('importModal')">×</button></div>
    <div class="modal-body">
      <div class="field">
        <label>名称覆盖（可选，默认取包内 SKILL.md 的 name）</label>
        <input id="zipName" placeholder="留空则自动识别" />
      </div>
      <div class="drop" id="zipDrop">点击或拖拽 .zip 到此处</div>
      <input type="file" id="zipInput" accept=".zip" style="display:none;" />
      <div class="meta" id="zipInfo" style="margin-top:10px;"></div>
    </div>
    <div class="modal-foot">
      <button class="ghost" onclick="closeModal('importModal')">取消</button>
      <button id="zipBtn" onclick="importZip()" disabled>导入</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "";
let SHARING = false;
let currentName = null;   // null => create mode
let zipB64 = null;

function toast(msg, sub, ok=true) {
  const box = document.getElementById("toast");
  const el = document.createElement("div");
  el.className = "t " + (ok ? "ok" : "err");
  el.innerHTML = `<div>${esc(msg)}</div>` + (sub ? `<div class="sub">${esc(sub)}</div>` : "");
  box.appendChild(el);
  setTimeout(() => el.remove(), 4200);
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtTime(iso){ if(!iso) return "—"; try { return new Date(iso).toLocaleString("zh-CN",{hour12:false}); } catch(e){ return iso; } }

async function api(path, opts) {
  const res = await fetch(API + path, opts);
  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : {}; } catch(e){ data = {raw:text}; }
  if (!res.ok) throw new Error(data.detail || data.raw || res.statusText);
  return data;
}
function fileToB64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(",")[1] || "");
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
function cloudNote(cloud) {
  if (!cloud || !cloud.synced) {
    if (cloud && cloud.reason === "sharing_disabled") return "未开启云端同步";
    if (cloud && cloud.reason) return "云端同步失败: " + cloud.reason;
    return "";
  }
  if (cloud.action === "delete") return cloud.deleted ? "已从云端删除" : "云端无此技能";
  return `已同步云端 (上传 ${cloud.uploaded||0})`;
}

async function refresh() {
  try {
    const data = await api("/api/skills");
    SHARING = !!data.sharing_enabled;
    document.getElementById("cloudDot").className = "dot " + (SHARING ? "on" : "off");
    document.getElementById("cloudTxt").textContent = SHARING ? "云端同步：已开启（保存即同步）" : "云端同步：未开启";
    document.getElementById("statSync").textContent = SHARING ? "已开启" : "未开启";
    renderList(data.skills || []);
  } catch(e) {
    toast("加载失败", e.message, false);
  }
}

function renderList(skills) {
  document.getElementById("statTotal").textContent = skills.length;
  const cats = new Set(skills.map(s => s.category || "general"));
  document.getElementById("statCats").textContent = cats.size;
  document.getElementById("statBundles").textContent = skills.filter(s => (s.file_count||0) > 1).length;
  document.getElementById("listCount").textContent = `(${skills.length})`;
  const tb = document.getElementById("skillRows");
  if (!skills.length) { tb.innerHTML = `<tr><td colspan="6" class="empty">暂无技能，点击右上角「新建技能」或上传 .zip</td></tr>`; return; }
  tb.innerHTML = skills.map(s => `
    <tr class="clickable" onclick="openEdit('${esc(s.name)}')">
      <td class="mono">${esc(s.name)}</td>
      <td><span class="badge ${s.category==='general'?'gray':'purple'}">${esc(s.category||'general')}</span></td>
      <td class="desc-cell">${esc(s.description||'')}</td>
      <td>${(s.file_count||0)>1?`<span class="badge blue">${s.file_count} 文件</span>`:'<span class="meta">—</span>'}</td>
      <td class="meta">${fmtTime(s.updated_at)}</td>
      <td onclick="event.stopPropagation()"><div class="row-actions">
        <button class="ghost sm" onclick="openEdit('${esc(s.name)}')">编辑</button>
        <button class="ghost sm danger" onclick="delSkill('${esc(s.name)}')">删除</button>
      </div></td>
    </tr>`).join("");
}

// ---------------- editor ----------------
function switchTab(t) {
  document.querySelectorAll("#editModal .tab").forEach(b => b.classList.toggle("active", b.dataset.tab===t));
  document.getElementById("tab-form").style.display = t==="form"?"":"none";
  document.getElementById("tab-raw").style.display = t==="raw"?"":"none";
  document.getElementById("tab-files").style.display = t==="files"?"":"none";
}
function openModal(id){ document.getElementById(id).classList.add("open"); }
function closeModal(id){ document.getElementById(id).classList.remove("open"); }

function openCreate() {
  currentName = null;
  document.getElementById("editTitle").textContent = "新建技能";
  document.getElementById("fName").value = "";
  document.getElementById("fName").disabled = false;
  document.getElementById("fCategory").value = "general";
  document.getElementById("fDesc").value = "";
  document.getElementById("fBody").value = "";
  document.getElementById("fRaw").value = "";
  document.getElementById("editHint").textContent = "";
  document.getElementById("filesTabBtn").style.display = "none";
  switchTab("form");
  openModal("editModal");
}

async function openEdit(name) {
  try {
    const s = await api("/api/skills/" + encodeURIComponent(name));
    currentName = name;
    document.getElementById("editTitle").textContent = "编辑技能 · " + name;
    document.getElementById("fName").value = s.name || "";
    document.getElementById("fName").disabled = true;
    document.getElementById("fCategory").value = s.category || "general";
    document.getElementById("fDesc").value = s.description || "";
    document.getElementById("fBody").value = s.body || "";
    document.getElementById("fRaw").value = s.skill_md || "";
    document.getElementById("editHint").textContent = "";
    document.getElementById("filesTabBtn").style.display = "";
    renderFiles(s.files || []);
    switchTab("form");
    openModal("editModal");
  } catch(e) { toast("读取失败", e.message, false); }
}

function renderFiles(files) {
  const extras = files.filter(f => f !== "SKILL.md");
  const wrap = document.getElementById("fileListWrap");
  if (!extras.length) { wrap.innerHTML = `<p class="meta">暂无附件文件（仅 SKILL.md）。</p>`; return; }
  wrap.innerHTML = `<ul class="file-list">` + extras.map(f => `
    <li><span class="fp">${esc(f)}</span>
      <button class="ghost sm danger" onclick="delFile('${esc(f)}')">删除</button></li>`).join("") + `</ul>`;
}

async function saveSkill() {
  const raw = document.getElementById("fRaw").value.trim();
  const name = document.getElementById("fName").value.trim();
  const body = {
    name: currentName || name,
    description: document.getElementById("fDesc").value,
    category: document.getElementById("fCategory").value || "general",
    body: document.getElementById("fBody").value,
    skill_md: raw,
  };
  if (!body.name) { toast("请填写名称", "", false); return; }
  const btn = document.getElementById("saveBtn"); btn.disabled = true;
  try {
    const r = await api("/api/skills", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
    toast(r.created ? "已创建技能" : "已保存技能", cloudNote(r.cloud));
    closeModal("editModal");
    refresh();
  } catch(e) { toast("保存失败", e.message, false); }
  finally { btn.disabled = false; }
}

async function delSkill(name) {
  if (!confirm(`确认删除技能「${name}」？此操作会删除本地目录` + (SHARING ? "并同步删除云端。" : "。"))) return;
  try {
    const r = await api("/api/skills/" + encodeURIComponent(name), { method:"DELETE" });
    toast("已删除技能", cloudNote(r.cloud));
    refresh();
  } catch(e) { toast("删除失败", e.message, false); }
}

async function delFile(rel) {
  if (!currentName) return;
  if (!confirm(`确认删除文件「${rel}」？`)) return;
  try {
    const r = await api(`/api/skills/${encodeURIComponent(currentName)}/files/${rel.split("/").map(encodeURIComponent).join("/")}`, { method:"DELETE" });
    toast("已删除文件", cloudNote(r.cloud));
    openEdit(currentName);
  } catch(e) { toast("删除失败", e.message, false); }
}

async function uploadFiles(fileList) {
  if (!currentName) { toast("请先保存技能再上传附件", "", false); return; }
  const files = [];
  for (const f of fileList) files.push({ path: f.name, content_b64: await fileToB64(f) });
  try {
    const r = await api(`/api/skills/${encodeURIComponent(currentName)}/files`, {
      method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({files})
    });
    toast(`已上传 ${r.written.length} 个文件`, cloudNote(r.cloud));
    openEdit(currentName);
  } catch(e) { toast("上传失败", e.message, false); }
}

// ---------------- zip import ----------------
function openImport() {
  zipB64 = null;
  document.getElementById("zipName").value = "";
  document.getElementById("zipInfo").textContent = "";
  document.getElementById("zipBtn").disabled = true;
  openModal("importModal");
}
async function pickZip(file) {
  if (!file) return;
  zipB64 = await fileToB64(file);
  document.getElementById("zipInfo").textContent = `已选择：${file.name} (${(file.size/1024).toFixed(1)} KB)`;
  document.getElementById("zipBtn").disabled = false;
}
async function importZip() {
  if (!zipB64) return;
  const btn = document.getElementById("zipBtn"); btn.disabled = true;
  try {
    const r = await api("/api/skills/import-zip", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ zip_b64: zipB64, name: document.getElementById("zipName").value.trim() })
    });
    toast(r.created ? "已导入新技能" : "已覆盖技能", `${r.name} · ${cloudNote(r.cloud)}`);
    closeModal("importModal");
    refresh();
  } catch(e) { toast("导入失败", e.message, false); }
  finally { btn.disabled = false; }
}

// ---------------- drag & drop wiring ----------------
function wireDrop(dropId, inputId, onFiles, multiple) {
  const drop = document.getElementById(dropId), input = document.getElementById(inputId);
  drop.onclick = () => input.click();
  input.onchange = () => { if (input.files.length) onFiles(multiple ? input.files : input.files[0]); input.value = ""; };
  ["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
  ["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
  drop.addEventListener("drop", e => { const fs = e.dataTransfer.files; if (fs.length) onFiles(multiple ? fs : fs[0]); });
}
wireDrop("fileDrop", "fileInput", uploadFiles, true);
wireDrop("zipDrop", "zipInput", pickZip, false);

refresh();
</script>
</body>
</html>
